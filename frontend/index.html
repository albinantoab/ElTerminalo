<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Terminalo</title>
  <link rel="stylesheet" href="/src/styles/global.css" />
</head>
<body>
  <!-- Splash screen -->
  <div id="splash">
    <div class="splash-content">
      <img class="splash-logo" src="/src/images/logo.png" alt="" />
      <div class="splash-text">
        <span class="splash-title">El Terminalo</span>
        <span class="splash-cursor">_</span>
      </div>
      <div class="splash-loader">
        <div class="splash-loader-bar"></div>
      </div>
    </div>
  </div>

  <div id="app">
    <div id="titlebar">EL TERMINALO</div>
    <div id="tab-bar"></div>
    <div id="pane-container"></div>
    <div id="statusbar"></div>
    <div id="palette-overlay" class="hidden"></div>
    <div id="wizard-overlay" class="hidden"></div>
    <div id="theme-wizard-overlay" class="hidden"></div>
    <div id="status-overlay" class="hidden"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
