name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '20'
  CGO_LDFLAGS: '-framework Accelerate -framework Foundation -framework Metal -framework MetalKit -framework MetalPerformanceShaders'

jobs:
  setup-llm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Cache llama.cpp build
        id: cache-llm
        uses: actions/cache@v4
        with:
          path: deps/go-llama.cpp
          key: llm-${{ runner.os }}-${{ hashFiles('go.mod') }}
      - name: Build llama.cpp
        if: steps.cache-llm.outputs.cache-hit != 'true'
        run: make setup-llm
      - uses: actions/upload-artifact@v4
        with:
          name: llm-deps
          path: deps/go-llama.cpp
          retention-days: 1

  lint-go:
    needs: setup-llm
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: llm-deps
          path: deps/go-llama.cpp
      - name: Stub frontend dist for go:embed
        run: mkdir -p frontend/dist && touch frontend/dist/index.html
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall

  build-go:
    needs: setup-llm
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: llm-deps
          path: deps/go-llama.cpp
      - name: Stub frontend dist for go:embed
        run: mkdir -p frontend/dist && touch frontend/dist/index.html
      - run: go vet ./...

  test-go:
    needs: setup-llm
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: llm-deps
          path: deps/go-llama.cpp
      - name: Stub frontend dist for go:embed
        run: mkdir -p frontend/dist && touch frontend/dist/index.html
      - run: go test ./...

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npx tsc --noEmit

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run build
